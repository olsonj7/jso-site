<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JSO Solutions — Contact</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="/index.html"><img src="/assets/images/logo.svg" alt="JSO Solutions logo" /></a>
      <nav class="main-nav" aria-label="Main navigation">
        <ul>
          <li><a href="/index.html">Home</a></li>
          <li><a href="/services.html">Services</a></li>
          <li><a href="/products/index.html">Products</a></li>
          <li><a href="/contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1>Contact JSO Solutions</h1>
      <p>For inquiries, email <a href="mailto:info@jsotechsolutions.com">info@jsotechsolutions.com</a> or use the form below.</p>

      <form method="post" action="mailto:info@jsotechsolutions.com" enctype="text/plain">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" />

        <label for="message">Message</label>
        <textarea id="message" name="message"></textarea>

        <button type="submit">Send</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 JSO Solutions</p>
    </div>
  </footer>
